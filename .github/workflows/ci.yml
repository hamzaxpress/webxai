name: WebX CI/CD
  
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webx-dist
          path: dist

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Install rsync and SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: webx-dist
          path: dist

      - name: Deploy via rsync
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          DEPLOY_HOST="$(printf "%s" "${DEPLOY_HOST:-}" | tr -d '\r')"
          DEPLOY_USER="$(printf "%s" "${DEPLOY_USER:-}" | tr -d '\r')"
          DEPLOY_PATH="$(printf "%s" "${DEPLOY_PATH:-}" | tr -d '\r')"

          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          : "${DEPLOY_KEY:?DEPLOY_KEY is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"

          DEPLOY_PATH_CLEAN="${DEPLOY_PATH%/}"
          if [ -z "$DEPLOY_PATH_CLEAN" ] || [ "$DEPLOY_PATH_CLEAN" = "/" ]; then
            echo "DEPLOY_PATH is invalid: '$DEPLOY_PATH'"
            exit 1
          fi

          PORT="${DEPLOY_PORT:-22}"

          mkdir -p ~/.ssh
          printf "%s" "$DEPLOY_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Deploying to $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH_CLEAN"
          ssh-keyscan -p "$PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_rsa -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH_CLEAN'"

          rsync -az --delete -e "ssh -i ~/.ssh/id_rsa -p $PORT" \
            dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH_CLEAN/"
